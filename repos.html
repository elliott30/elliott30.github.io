<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repos — Elliott</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <div class="inner">
      <a href="index.html" class="brand">elliott30</a>
      <a href="index.html">Profile</a>
      <a href="repos.html" class="active">Repos</a>
    </div>
  </nav>

  <main>
    <h1 class="page-title">Public Repos</h1>
    <p class="page-subtitle">Projects from <a href="https://github.com/elliott30" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;">github.com/elliott30</a></p>

    <div id="repo-list" class="repo-grid">
      <p class="loading">Loading repos…</p>
    </div>
  </main>

  <script>
    async function loadRepos() {
      const container = document.getElementById('repo-list');
      try {
        const res = await fetch(
          'https://api.github.com/users/elliott30/repos?sort=updated&per_page=100',
          { headers: { Accept: 'application/vnd.github+json' } }
        );
        if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
        const repos = await res.json();

        // Filter out forks, sort by updated
        const own = repos
          .filter(r => !r.fork)
          .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

        if (own.length === 0) {
          container.innerHTML = '<p class="loading">No public repos yet.</p>';
          return;
        }

        container.innerHTML = '';
        own.forEach(r => {
          const updatedAgo = timeAgo(new Date(r.updated_at));

          const card = document.createElement('div');
          card.className = 'repo-card';

          // Name link
          const nameDiv = document.createElement('div');
          nameDiv.className = 'repo-name';
          const nameLink = document.createElement('a');
          nameLink.href = r.html_url;
          nameLink.target = '_blank';
          nameLink.rel = 'noopener';
          nameLink.textContent = r.name;
          nameDiv.appendChild(nameLink);
          card.appendChild(nameDiv);

          // Description
          if (r.description) {
            const desc = document.createElement('div');
            desc.className = 'repo-desc';
            desc.textContent = r.description;
            card.appendChild(desc);
          }

          // Meta row: language · stars · updated · website
          const meta = document.createElement('div');
          meta.className = 'repo-meta';

          if (r.language) {
            const lang = document.createElement('span');
            lang.textContent = '● ' + r.language;
            meta.appendChild(lang);
          }
          if (r.stargazers_count > 0) {
            const stars = document.createElement('span');
            stars.textContent = '★ ' + r.stargazers_count;
            meta.appendChild(stars);
          }
          const updated = document.createElement('span');
          updated.textContent = 'Updated ' + updatedAgo;
          meta.appendChild(updated);

          if (r.homepage) {
            const site = document.createElement('a');
            site.href = r.homepage;
            site.target = '_blank';
            site.rel = 'noopener';
            site.className = 'repo-site';
            site.textContent = '↗ ' + r.homepage.replace(/^https?:\/\//, '');
            meta.appendChild(site);
          }

          card.appendChild(meta);
          container.appendChild(card);
        });
      } catch (err) {
        container.innerHTML = `<p class="error-msg">Could not load repos: ${err.message}</p>`;
      }
    }

    function timeAgo(date) {
      const s = Math.floor((Date.now() - date) / 1000);
      if (s < 60) return 'just now';
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      const d = Math.floor(h / 24);
      if (d < 30) return `${d}d ago`;
      const mo = Math.floor(d / 30);
      if (mo < 12) return `${mo}mo ago`;
      return `${Math.floor(mo / 12)}y ago`;
    }

    loadRepos();
  </script>
</body>
</html>
